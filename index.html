<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Mendoza Cars — Calculadora de Pagos</title>
<meta name="theme-color" content="#1e3a8a">
<meta name="description" content="Calculadora interna de pagos mensuales - Mendoza Cars">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mendoza Cars">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>

<style>
  html, body { margin:0; padding:0; }
  #root { min-height:100vh; }
</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useMemo, useEffect } = React;

    
// ---- Nevada: detalle exacto por condado (código postal -> condado -> tasa) ----
const NV_COUNTY_RATES = {
  Clark: 8.375,
  Washoe: 8.265,
  'Carson City': 7.6,
  Douglas: 7.1,
  Elko: 7.1,
  Nye: 7.6,
  Lyon: 7.1,
  Churchill: 7.6,
  Lincoln: 7.1,
  'White Pine': 7.725,
  Humboldt: 6.85,
  Pershing: 7.1,
  Storey: 7.6,
  Mineral: 6.85,
  Esmeralda: 6.85,
  Eureka: 6.85,
  Lander: 7.1,
};
const NV_ZIP_EXCEPTIONS = {
  '89001': 'Lincoln',
  '89003': 'Nye',
  '89020': 'Clark',
  '89041': 'Nye',
  '89042': 'Lincoln',
  '89043': 'Lincoln',
  '89048': 'Nye',
  '89049': 'Nye',
  '89060': 'Nye',
  '89061': 'Nye',
};
function lookupNvCounty(zip) {
  if (!/^\d{5}$/.test(zip)) return null;
  if (NV_ZIP_EXCEPTIONS[zip]) return NV_ZIP_EXCEPTIONS[zip];
  const p3 = zip.slice(0, 3);
  if (p3 === '890' || p3 === '891') return 'Clark';
  if (p3 === '894' || p3 === '895') return 'Washoe';
  if (p3 === '897') return 'Carson City';
  if (p3 === '898') return 'Elko';
  return null;
}

// ---- Estados de USA: tasa base + si aplica crédito fiscal por trade-in ----
// rate = tasa estatal base (el add-on local de condado/ciudad se ajusta manualmente en el campo de abajo)
// credit: true = sí aplica crédito, false = no aplica (se paga impuesto sobre el precio completo)
// creditCap: límite en dólares al crédito de trade-in, si el estado lo topa
// note: aclaración de reglas especiales
const US_STATES = {
  AL: { name: 'Alabama', rate: 4, credit: true },
  AK: { name: 'Alaska', rate: 0, credit: false, note: 'Sin tax estatal; el local (hasta 7.5%) no da crédito por trade-in' },
  AZ: { name: 'Arizona', rate: 5.6, credit: true },
  AR: { name: 'Arkansas', rate: 6.5, credit: true },
  CA: { name: 'California', rate: 7.25, credit: false, note: 'No aplica crédito de trade-in; se paga sobre el precio completo' },
  CO: { name: 'Colorado', rate: 2.9, credit: true },
  CT: { name: 'Connecticut', rate: 6.35, credit: true },
  DE: { name: 'Delaware', rate: 0, credit: false, note: 'Sin sales tax; aplica doc fee estatal de 4.25% en su lugar' },
  FL: { name: 'Florida', rate: 6, credit: true },
  GA: { name: 'Georgia', rate: 7, credit: false, note: 'Usa TAVT (Title Ad Valorem Tax) sobre valor justo de mercado, no precio de venta' },
  HI: { name: 'Hawái', rate: 4, credit: false, note: 'No aplica crédito de trade-in' },
  ID: { name: 'Idaho', rate: 6, credit: true },
  IL: { name: 'Illinois', rate: 6.25, credit: true },
  IN: { name: 'Indiana', rate: 7, credit: true },
  IA: { name: 'Iowa', rate: 6, credit: true },
  KS: { name: 'Kansas', rate: 6.5, credit: true },
  KY: { name: 'Kentucky', rate: 6, credit: true },
  LA: { name: 'Luisiana', rate: 4.45, credit: true },
  ME: { name: 'Maine', rate: 5.5, credit: true },
  MD: { name: 'Maryland', rate: 6, credit: true },
  MA: { name: 'Massachusetts', rate: 6.25, credit: true },
  MI: { name: 'Michigan', rate: 6, credit: true, creditCap: 12000, note: 'Crédito de trade-in topado en $12,000 (2026); sube cada año hasta eliminarse en 2029' },
  MN: { name: 'Minnesota', rate: 6.875, credit: true },
  MS: { name: 'Misisipi', rate: 7, credit: true },
  MO: { name: 'Misuri', rate: 4.225, credit: true },
  MT: { name: 'Montana', rate: 0, credit: false, note: 'Sin sales tax estatal en vehículos' },
  NE: { name: 'Nebraska', rate: 5.5, credit: true },
  NV: { name: 'Nevada', rate: 6.85, credit: true, note: 'Usa el detector por código postal arriba para el detalle exacto por condado' },
  NH: { name: 'New Hampshire', rate: 0, credit: false, note: 'Sin sales tax estatal en vehículos' },
  NJ: { name: 'Nueva Jersey', rate: 6.625, credit: true },
  NM: { name: 'Nuevo México', rate: 4, credit: true, note: 'Excise tax de vehículos, no sales tax tradicional' },
  NY: { name: 'Nueva York', rate: 4, credit: true, note: 'El add-on local de condado suele sumar bastante — ajusta la tasa final abajo' },
  NC: { name: 'Carolina del Norte', rate: 3, credit: false, note: 'Highway Use Tax, tope de $2,000 en la mayoría de vehículos — no es % puro' },
  ND: { name: 'Dakota del Norte', rate: 5, credit: true },
  OH: { name: 'Ohio', rate: 5.75, credit: true },
  OK: { name: 'Oklahoma', rate: 4.5, credit: false, note: '1.25% sales tax + 3.25% excise tax; no aplica crédito de trade-in' },
  OR: { name: 'Oregón', rate: 0, credit: false, note: 'Sin sales tax; 0.5% vehicle privilege tax en su lugar' },
  PA: { name: 'Pensilvania', rate: 6, credit: true },
  RI: { name: 'Rhode Island', rate: 7, credit: true },
  SC: { name: 'Carolina del Sur', rate: 5, credit: false, note: 'Infrastructure Maintenance Fee topado en $500 — no es % puro' },
  SD: { name: 'Dakota del Sur', rate: 4, credit: true },
  TN: { name: 'Tennessee', rate: 7, credit: true },
  TX: { name: 'Texas', rate: 6.25, credit: true },
  UT: { name: 'Utah', rate: 4.85, credit: true },
  VT: { name: 'Vermont', rate: 6, credit: true },
  VA: { name: 'Virginia', rate: 4.15, credit: false, note: 'No aplica crédito de trade-in' },
  WA: { name: 'Washington', rate: 6.5, credit: true },
  WV: { name: 'Virginia Occidental', rate: 6, credit: true },
  WI: { name: 'Wisconsin', rate: 5, credit: true },
  WY: { name: 'Wyoming', rate: 4, credit: true },
  DC: { name: 'Washington D.C.', rate: 6, credit: false, note: 'No aplica crédito de trade-in' },
};

function PaymentCalculator() {
  const [stateCode, setStateCode] = useState('NV');
  const [zip, setZip] = useState('89052');
  const [zipCounty, setZipCounty] = useState('Clark');
  const [price, setPrice] = useState(38000);
  const [down, setDown] = useState(3000);
  const [tradeValue, setTradeValue] = useState(0);
  const [tradePayoff, setTradePayoff] = useState(0);
  const [apr, setApr] = useState(6.9);
  const [term, setTerm] = useState(72);
  const [taxRate, setTaxRate] = useState(8.375);
  const [feeTaxable, setFeeTaxable] = useState(499);
  const [titleFee, setTitleFee] = useState(28.25);
  const [bookValue, setBookValue] = useState(0);

  const stateInfo = US_STATES[stateCode];

  // Al cambiar de estado, precarga la tasa base (siempre editable después)
  useEffect(() => {
    if (stateCode === 'NV') {
      const county = lookupNvCounty(zip);
      if (county) {
        setZipCounty(county);
        setTaxRate(NV_COUNTY_RATES[county]);
      } else {
        setZipCounty(null);
      }
    } else {
      setTaxRate(US_STATES[stateCode].rate);
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [stateCode]);

  useEffect(() => {
    if (stateCode !== 'NV') return;
    const county = lookupNvCounty(zip);
    if (county) {
      setZipCounty(county);
      setTaxRate(NV_COUNTY_RATES[county]);
    } else {
      setZipCounty(null);
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [zip]);

  const calc = useMemo(() => {
    const tradeEquity = tradeValue - tradePayoff; // puede ser negativo

    // ¿Este estado da crédito fiscal por el trade-in?
    const creditAllowed = stateInfo.credit;
    const rawCredit = creditAllowed ? tradeValue : 0;
    const cappedCredit = stateInfo.creditCap ? Math.min(rawCredit, stateInfo.creditCap) : rawCredit;

    // La base gravable nunca baja de 0: si el crédito es mayor al precio, no se "regresa" dinero,
    // simplemente el impuesto llega a $0 y ya.
    const taxableBase = Math.max(price - cappedCredit + feeTaxable, 0);
    const tax = taxableBase * (taxRate / 100);

    const amountFinanced = Math.max(
      price - down - tradeEquity + tax + feeTaxable + titleFee,
      0
    );
    const monthlyRate = apr / 100 / 12;
    let payment;
    if (monthlyRate === 0) {
      payment = amountFinanced / term;
    } else {
      payment =
        (amountFinanced * monthlyRate) /
        (1 - Math.pow(1 + monthlyRate, -term));
    }
    const totalPaid = payment * term;
    const totalInterest = totalPaid - amountFinanced;
    const ltv = bookValue > 0 ? (amountFinanced / bookValue) * 100 : null;

    return {
      tradeEquity,
      taxCredit: cappedCredit,
      tax,
      amountFinanced,
      payment,
      totalPaid,
      totalInterest,
      ltv,
      creditAllowed,
    };
  }, [price, down, tradeValue, tradePayoff, apr, term, taxRate, feeTaxable, titleFee, bookValue, stateInfo]);

  const fmt = (n) =>
    n.toLocaleString('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 });

  const Field = ({ label, value, onChange, prefix, suffix, step = 1, min = 0 }) => (
    <div className="mb-4">
      <label className="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-1.5">
        {label}
      </label>
      <div className="flex items-center border border-slate-300 focus-within:border-blue-600 bg-white transition-colors">
        {prefix && <span className="pl-3 text-slate-500 text-sm">{prefix}</span>}
        <input
          type="number"
          value={value}
          min={min}
          step={step}
          onChange={(e) => onChange(Number(e.target.value))}
          className="w-full px-3 py-2.5 text-slate-900 font-semibold text-lg outline-none bg-transparent"
        />
        {suffix && <span className="pr-3 text-slate-500 text-sm">{suffix}</span>}
      </div>
    </div>
  );

  return (
    <div className="min-h-screen bg-slate-100 flex items-start justify-center p-4 sm:p-8">
      <div className="w-full max-w-4xl bg-white shadow-xl">

        <div className="bg-blue-900 text-white px-6 sm:px-10 py-6 flex items-center justify-between relative overflow-hidden">
          <div className="absolute -right-6 top-0 bottom-0 w-40 bg-blue-500 opacity-90 [clip-path:polygon(30%_0,100%_0,70%_100%,0_100%)]"></div>
          <div className="relative z-10">
            <div className="font-black text-2xl tracking-widest uppercase">
              Mendoza <span className="text-blue-300">Cars</span>
            </div>
            <div className="text-blue-200 text-xs tracking-wide mt-1">
              Calculadora de pagos mensuales
            </div>
          </div>
        </div>

        <div className="bg-blue-50 border-b border-blue-100 px-6 sm:px-10 py-4 flex flex-wrap items-end gap-4">
          <div className="w-44">
            <label className="block text-xs font-bold uppercase tracking-widest text-blue-500 mb-1.5">
              Estado
            </label>
            <select
              value={stateCode}
              onChange={(e) => setStateCode(e.target.value)}
              className="w-full px-3 py-2 border border-blue-300 focus:border-blue-600 outline-none font-semibold text-base bg-white"
            >
              {Object.entries(US_STATES).map(([code, s]) => (
                <option key={code} value={code}>{s.name}</option>
              ))}
            </select>
          </div>

          {stateCode === 'NV' && (
            <div className="w-36">
              <label className="block text-xs font-bold uppercase tracking-widest text-blue-500 mb-1.5">
                Código postal
              </label>
              <input
                type="text"
                maxLength={5}
                value={zip}
                onChange={(e) => setZip(e.target.value.replace(/\D/g, ''))}
                className="w-full px-3 py-2 border border-blue-300 focus:border-blue-600 outline-none font-semibold text-lg bg-white"
                placeholder="89052"
              />
            </div>
          )}

          <div className="text-sm text-blue-800 max-w-md">
            {stateCode === 'NV' ? (
              zipCounty ? (
                <>Condado detectado: <span className="font-bold">{zipCounty}</span> — tasa {NV_COUNTY_RATES[zipCounty]}% (editable abajo)</>
              ) : (
                <>No se detectó el condado para este código — confirma la tasa manualmente.</>
              )
            ) : (
              <>Tasa base de {stateInfo.name}: <span className="font-bold">{stateInfo.rate}%</span> — el add-on local de condado/ciudad se ajusta en el campo de abajo.</>
            )}
            {!stateInfo.credit && (
              <div className="mt-1 text-amber-700 font-semibold">
                ⚠ {stateInfo.note || 'Este estado no aplica crédito fiscal por trade-in.'}
              </div>
            )}
            {stateInfo.credit && stateInfo.note && (
              <div className="mt-1 text-blue-600">{stateInfo.note}</div>
            )}
          </div>
        </div>

        <div className="grid sm:grid-cols-2 gap-8 p-6 sm:p-10">
          <div>
            <h2 className="text-sm font-bold uppercase tracking-widest text-blue-700 mb-4 border-b border-slate-200 pb-2">
              Datos del vehículo
            </h2>
            <Field label="Precio del vehículo" value={price} onChange={setPrice} prefix="$" step={100} />
            <Field label="Enganche (down payment)" value={down} onChange={setDown} prefix="$" step={100} />

            <h2 className="text-sm font-bold uppercase tracking-widest text-blue-700 mb-4 mt-6 border-b border-slate-200 pb-2">
              Vehículo de cambio (trade-in)
            </h2>
            <Field label="Valor del trade" value={tradeValue} onChange={setTradeValue} prefix="$" step={100} />
            <Field label="Payoff pendiente del trade" value={tradePayoff} onChange={setTradePayoff} prefix="$" step={100} />

            <h2 className="text-sm font-bold uppercase tracking-widest text-blue-700 mb-4 mt-6 border-b border-slate-200 pb-2">
              Financiamiento
            </h2>
            <div className="grid grid-cols-2 gap-4">
              <Field label="Tasa APR" value={apr} onChange={setApr} suffix="%" step={0.1} />
              <Field label="Plazo" value={term} onChange={setTerm} suffix="meses" step={6} />
            </div>
            <div className="grid grid-cols-2 gap-4">
              <Field label="Impuesto de venta (final)" value={taxRate} onChange={setTaxRate} suffix="%" step={0.125} />
            </div>
            <div className="grid grid-cols-2 gap-4">
              <Field label="Fee taxable (doc fee)" value={feeTaxable} onChange={setFeeTaxable} prefix="$" step={1} />
              <Field label="Title fee (no taxable)" value={titleFee} onChange={setTitleFee} prefix="$" step={0.25} />
            </div>

            <h2 className="text-sm font-bold uppercase tracking-widest text-blue-700 mb-4 mt-6 border-b border-slate-200 pb-2">
              LTV (lender / invoice)
            </h2>
            <Field label="Valor de libro (lending book / invoice)" value={bookValue} onChange={setBookValue} prefix="$" step={100} />
          </div>

          <div>
            <h2 className="text-sm font-bold uppercase tracking-widest text-slate-500 mb-4 border-b border-slate-200 pb-2">
              Resultado
            </h2>

            <div className="bg-blue-900 text-white p-6 mb-4">
              <div className="text-blue-200 text-xs uppercase tracking-widest mb-1">Pago mensual estimado</div>
              <div className="text-5xl font-black text-blue-300 leading-none">
                {fmt(calc.payment)}
              </div>
              <div className="text-blue-200 text-sm mt-2">durante {term} meses</div>
            </div>

            <div className="space-y-3">
              <Row label="Capital financiado" value={fmt(calc.amountFinanced)} />
              <Row
                label="Equidad del trade"
                value={fmt(calc.tradeEquity)}
                negative={calc.tradeEquity < 0}
              />
              <Row
                label={calc.creditAllowed ? 'Tax credit por trade' : 'Tax credit por trade (no aplica)'}
                value={fmt(calc.taxCredit)}
              />
              <Row label="Impuesto de venta" value={fmt(calc.tax)} />
              <Row label="Total de intereses" value={fmt(calc.totalInterest)} />
              <Row label="Total a pagar (vida del préstamo)" value={fmt(calc.totalPaid)} bold />
              {calc.ltv !== null && (
                <Row
                  label="LTV (capital financiado / valor de libro)"
                  value={`${calc.ltv.toFixed(1)}%`}
                  negative={calc.ltv > 120}
                  bold
                />
              )}
            </div>

            {calc.ltv !== null && calc.ltv > 120 && (
              <div className="mt-4 bg-amber-50 border border-amber-300 text-amber-900 text-sm p-3">
                LTV por encima de 120% — algunos bancos pueden pedir enganche adicional o rechazar la aprobación.
              </div>
            )}

            {calc.tradeEquity < 0 && (
              <div className="mt-4 bg-amber-50 border border-amber-300 text-amber-900 text-sm p-3">
                El cliente debe más de lo que vale su trade — esa diferencia ({fmt(Math.abs(calc.tradeEquity))}) se suma al monto financiado.
              </div>
            )}

            {calc.tax === 0 && price > 0 && calc.creditAllowed && (
              <div className="mt-4 bg-blue-50 border border-blue-200 text-blue-800 text-sm p-3">
                El crédito del trade cubre por completo el impuesto — no se genera saldo negativo, el impuesto simplemente llega a $0.
              </div>
            )}

            <div className="mt-6 text-xs text-slate-400 leading-relaxed">
              Estimación con fines informativos. Fuera de Nevada, la tasa mostrada es la base estatal — confirma el add-on local de condado/ciudad antes de cerrar. El pago final depende de la aprobación del banco y fees adicionales del dealer.
            </div>
          </div>
        </div>

        <div className="bg-slate-100 px-6 sm:px-10 py-4 text-xs text-slate-500 flex justify-between border-t border-slate-200">
          <span>Mendoza Cars &middot; Henderson &amp; Las Vegas, NV</span>
          <span>Herramienta interna de ventas</span>
        </div>
      </div>
    </div>
  );
}

function Row({ label, value, negative, bold }) {
  return (
    <div className="flex justify-between items-center py-2 border-b border-slate-100">
      <span className="text-sm text-slate-600">{label}</span>
      <span
        className={`text-base ${bold ? 'font-bold text-slate-900' : 'font-semibold'} ${
          negative ? 'text-red-600' : 'text-slate-800'
        }`}
      >
        {value}
      </span>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PaymentCalculator />);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').catch(function(err) {
          console.log('Service worker no se pudo registrar:', err);
        });
      });
    }
  </script>
</body>
</html>
